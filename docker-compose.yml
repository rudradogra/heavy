version: '3.8'

services:
  # 1. The Manager (Zookeeper)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: traceback_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # 2. The Message Queue (Kafka)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: traceback_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"   # Accessible to scripts running on your Mac
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 3. The Visual Dashboard (Kafka UI)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: traceback_kafka_ui
    ports:
      - "8080:8080"   # Open http://localhost:8080 in your browser
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: 'local-dev-cluster'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:29092'